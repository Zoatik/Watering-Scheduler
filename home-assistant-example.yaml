# After installing the integration through HACS, add this dashboard resource:
lovelace:
  resources:
    - url: /watering_scheduler/garden-watering-card.js
      type: module

# Then add one integration entry from:
# Settings > Devices & services > Add integration > Watering Scheduler
# Select the valve switch and optional timer number/input_number.

# Dashboard card example. The schedule_entity is the sensor created by the integration.
views:
  - title: Jardin
    cards:
      - type: custom:garden-watering-card
        title: Potager
        valve_name: Vanne potager
        schedule_entity: sensor.potager_schedule
        days:
          - key: mon
            label: Lun
          - key: tue
            label: Mar
          - key: wed
            label: Mer
          - key: thu
            label: Jeu
          - key: fri
            label: Ven
          - key: sat
            label: Sam
          - key: sun
            label: Dim
